spring:
  application:
    name: internet_banking_statement_service
  datasource:
    url: jdbc:h2:mem:statement_service_db
    username: root
    password: root
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false
server:
  port: 8087

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8081/eureka
    enabled: false

info:
  app:
    name: ${spring.application.name}
